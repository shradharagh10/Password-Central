<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Central</title>
  <style>
    :root {
      --bg:        #f0f4f9;
      --surface:   #ffffff;
      --border:    #d1d9e6;
      --accent:    #1e90ff;
      --accent-dim:#4a90e2;
      --danger:    #ff4757;
      --text:      #1a1a2e;
      --muted:     #6c757d;
      --mono:      'Courier New', 'JetBrains Mono', 'Fira Code', monospace;
      --sans:      'Segoe UI', 'Inter', system-ui, sans-serif;

      --vw: #ff6b7a; --w: #ffa502; --m: #ffc107;
      --s: #10b981;  --vs: #06b6d4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, #f0f4f9 0%, #e3f2fd 50%, #f0f4f9 100%);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
      gap: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      width: 100%;
      max-width: 540px;
    }
    header > div:first-child {
      flex: 1;
    }
    header h1 {
      font-family: var(--mono);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: -.03em;
      color: var(--accent);
      font-weight: 700;
    }
    header p {
      color: var(--muted);
      font-size: .9rem;
      margin-top: .35rem;
      font-weight: 500;
    }

    .logout-btn {
      background: linear-gradient(135deg, #ff6b7a, #ff4757);
      border: none;
      color: white;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .85rem;
      padding: .65rem 1.25rem;
      border-radius: 8px;
      transition: all .2s;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(255, 71, 87, 0.2);
    }
    .logout-btn:hover {
      background: linear-gradient(135deg, #ff5566, #ff3347);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 71, 87, 0.3);
    }

    .tabs {
      display: flex;
      gap: .5rem;
      background: var(--surface);
      border: 2px solid var(--border);
      padding: .5rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(30, 144, 255, 0.1);
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--sans);
      font-size: .9rem;
      padding: .65rem 1.25rem;
      cursor: pointer;
      transition: all .2s;
      font-weight: 600;
      border-radius: 8px;
    }
    .tab-btn:hover  { color: var(--accent); background: rgba(30, 144, 255, 0.05); }
    .tab-btn.active { background: linear-gradient(135deg, #e3f2fd, #bbdefb); color: var(--accent); }

    .card {
      width: 100%;
      max-width: 540px;
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(30, 144, 255, 0.15);
    }

    .panel { display: none; flex-direction: column; gap: 1.1rem; }
    .panel.active { display: flex; }

    label {
      font-size: .78rem;
      color: var(--text);
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .field { display: flex; flex-direction: column; gap: .5rem; }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    input[type="email"] {
      background: #f8fbff;
      border: 2px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: .95rem;
      padding: .75rem 1rem;
      outline: none;
      transition: all .2s;
      width: 100%;
      border-radius: 8px;
    }
    input:focus { 
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.1);
    }

    .pwd-row {
      display: flex;
      gap: .5rem;
      align-items: center;
    }
    .pwd-row input { flex: 1; }

    .btn {
      background: linear-gradient(135deg, #1e90ff, #4a90e2);
      border: none;
      color: white;
      cursor: pointer;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 700;
      padding: .75rem 1.5rem;
      transition: all .2s;
      white-space: nowrap;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(30, 144, 255, 0.2);
    }
    .btn:hover   { 
      background: linear-gradient(135deg, #1a7fdb, #3d85d8);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(30, 144, 255, 0.3);
    }
    .btn:active  { transform: translateY(0); }
    .btn.danger  { background: linear-gradient(135deg, #ff6b7a, #ff4757); box-shadow: 0 4px 12px rgba(255, 71, 87, 0.2); }
    .btn.danger:hover { 
      background: linear-gradient(135deg, #ff5566, #ff3347);
      box-shadow: 0 6px 16px rgba(255, 71, 87, 0.3);
    }
    .btn.full    { width: 100%; }
    .btn.icon    { padding: .65rem .8rem; font-size: 1rem; min-width: 44px; }

    .strength-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .strength-bar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .strength-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .3s cubic-bezier(0.4, 0, 0.2, 1), background .3s;
      width: 0;
      box-shadow: 0 2px 8px rgba(30, 144, 255, 0.3);
    }
    .strength-label {
      font-family: var(--mono);
      font-size: .78rem;
      min-width: 80px;
      text-align: right;
      font-weight: 700;
      color: var(--accent);
    }

    .suggestions {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .suggestions li {
      font-size: .83rem;
      color: var(--muted);
      padding-left: 1.5rem;
      position: relative;
      background: rgba(30, 144, 255, 0.03);
      padding: .5rem .75rem .5rem 1.5rem;
      border-radius: 6px;
    }
    .suggestions li::before {
      content: "✓";
      position: absolute;
      left: .5rem;
      color: var(--accent);
      font-weight: 700;
    }

    .vault-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .vault-header h2 { font-size: 1.1rem; color: var(--text); font-weight: 700; }
    .vault-list { display: flex; flex-direction: column; gap: .8rem; }
    .vault-entry {
      background: linear-gradient(135deg, #f8fbff, #ffffff);
      border: 2px solid var(--border);
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      border-radius: 10px;
      transition: all .2s;
    }
    .vault-entry:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(30, 144, 255, 0.1);
    }
    .vault-entry-info { flex: 1; min-width: 0; }
    .vault-entry-user {
      font-weight: 700;
      font-size: .9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .vault-entry-pwd {
      font-family: var(--mono);
      font-size: .82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: .05em;
    }
    .vault-empty {
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      padding: 2rem 0;
      font-style: italic;
    }

    #tab-about {
      text-align: center;
      color: var(--muted);
    }
    #tab-about a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
      transition: all .2s;
    }
    #tab-about a:hover {
      color: var(--accent-dim);
      text-decoration: underline;
    }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--surface);
      border: 2px solid var(--accent);
      padding: .75rem 1.5rem;
      font-size: .88rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 99;
      white-space: nowrap;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(30, 144, 255, 0.2);
      color: var(--text);
      font-weight: 600;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .slider-val {
      font-family: var(--mono);
      font-size: .88rem;
      min-width: 28px;
      text-align: right;
      font-weight: 700;
      color: var(--accent);
    }

    @media only screen and (max-width: 64em) {
      body { padding: 1.5rem 1rem 2rem; }
      .card { padding: 1.5rem; }
      header { flex-direction: column; gap: 1rem; }
      .logout-btn { width: 100%; }
    }

    @media only screen and (max-width: 37.5em) {
      header h1 { font-size: 1.5rem; }
      .card { padding: 1rem; }
      .btn { padding: .65rem 1rem; font-size: .85rem; }
      .tabs { flex-wrap: wrap; }
      .tab-btn { padding: .5rem .75rem; font-size: .8rem; }
    }
  </style>
  
</head>

<body>

<header>
  <div>
    <h1>🛡️Password Central</h1>
    <p>Generate · Review · Store · Learn</p>
  </div>
  <button class="logout-btn" id="logout-btn" title="Log out and clear session">Log out</button>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="generate">Generate</button>
  <button class="tab-btn"        data-tab="review">Review</button>
  <button class="tab-btn"        data-tab="vault">Vault</button>
  <button class="tab-btn"        data-tab="about">About</button>
</div>

<div class="card">

  <div class="panel active" id="tab-generate">
    <div class="field">
      <label>Password length</label>
      <div class="slider-row">
        <input type="range" id="gen-length" min="8" max="40" value="12" />
        <span class="slider-val" id="gen-length-val">12</span>
      </div>
    </div>

    <button class="btn full" id="gen-btn">Generate password</button>

    <div class="field" id="gen-result-block" style="display:none">
      <label>Generated password</label>
      <div class="pwd-row">
        <input type="text" id="gen-output" readonly />
        <button class="btn icon" id="gen-copy" title="Copy">⎘</button>
      </div>
      <div class="strength-row">
        <div class="strength-bar"><div class="strength-bar-fill" id="gen-bar"></div></div>
        <span class="strength-label" id="gen-strength-lbl"></span>
      </div>
    </div>

    <div id="gen-save-block" style="display:none">
      <div class="field">
        <label>Save to vault — app / service</label>
        <input type="text" id="gen-app" placeholder="e.g. GitHub, Netflix" />
      </div>
      <button class="btn full" id="gen-save-btn">Save to vault</button>
    </div>
  </div>

  <div class="panel" id="tab-review">
    <div class="field">
      <label>Your password</label>
      <input type="text" id="rev-input" placeholder="Paste or type a password…" />
    </div>

    <button class="btn full" id="rev-btn">Check strength</button>

    <div id="rev-result-block" style="display:none">
      <div class="field">
        <div class="strength-row">
          <div class="strength-bar"><div class="strength-bar-fill" id="rev-bar"></div></div>
          <span class="strength-label" id="rev-strength-lbl"></span>
        </div>
      </div>
      <ul class="suggestions" id="rev-suggestions"></ul>
    </div>

    <div id="rev-save-block" style="display:none">
      <div class="field">
        <label>App / service</label>
        <input type="text" id="rev-app" placeholder="e.g. Netflix, Slack" />
      </div>
      <button class="btn full" id="rev-save-btn">Save to vault</button>
    </div>
  </div>

  <div class="panel" id="tab-vault">
    <div class="vault-header">
      <h2>Saved passwords</h2>
      <button class="btn" id="vault-refresh-btn">↺ Refresh</button>
    </div>
    <div class="vault-list" id="vault-list">
      <p class="vault-empty">Loading…</p>
    </div>
  </div>

  <div class="panel" id="tab-about">
    <h2>Information Page</h2>
    <a href="https://www.nicybersecuritycentre.gov.uk/articles/importance-strong-passwords">Why Strong Passwords Matter</a>
  </div>

</div><!-- /card -->

<div id="toast"></div>

<script>

  function toast(msg, duration = 2400) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), duration);
  }

  const STRENGTH_CONFIG = {
    "Very Weak": { pct: 12,  color: "var(--vw)" },
    "Weak":      { pct: 30,  color: "var(--w)"  },
    "Medium":    { pct: 55,  color: "var(--m)"  },
    "Strong":    { pct: 78,  color: "var(--s)"  },
    "Very Strong":{ pct: 100, color: "var(--vs)" },
  };

  function applyStrength(bar, label, strength) {
    const cfg = STRENGTH_CONFIG[strength] || STRENGTH_CONFIG["Very Weak"];
    bar.style.width    = cfg.pct + "%";
    bar.style.background = cfg.color;
    label.textContent  = strength;
    label.style.color  = cfg.color;
  }

  let currentUserEmail = "";
  let currentUserId = null;
  let isAuthenticated = false;

  async function api(path, opts = {}) {
    const res = await fetch(path, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      // If unauthorized, immediately redirect to login
      if (res.status === 403 || res.status === 401) {
        window.location.href = "/login";
        return;
      }
      throw new Error(err.error || "Request failed");
    }
    return res.json();
  }

  async function initApp() {
    try {
      const me = await api("/api/me").catch(() => null);
      if (!me || !me.loggedIn) {
        // Clear all data immediately
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "/login";
        return;
      }
      currentUserEmail = me.email || "";
      currentUserId = me.userId || null;
      isAuthenticated = true;
    } catch (e) {
      // Any error during auth check means redirect to login
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = "/login";
    }
  }

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
      if (btn.dataset.tab === "vault") {
        loadVault();
      }
    });
  });

  initApp();

  // Logout functionality with complete data clearing
  async function logout() {
    try {
      // Clear all client data first
      localStorage.clear();
      sessionStorage.clear();
      // Clear form inputs
      document.querySelectorAll("input[type='text'], input[type='password']").forEach(el => el.value = "");
      // Notify server
      await api("/api/logout", { method: "POST" });
    } catch (e) {
      console.error("Logout error:", e);
    } finally {
      // Always redirect to login even if API call fails
      isAuthenticated = false;
      currentUserEmail = "";
      currentUserId = null;
      window.location.href = "/login";
    }
  }

  // Handle logout button click
  document.getElementById("logout-btn").addEventListener("click", logout);

  // Auto-logout when user leaves the page
  window.addEventListener("beforeunload", (event) => {
    if (!isAuthenticated) return;
    // Use sendBeacon to ensure the logout request is sent even if page is unloading
    navigator.sendBeacon("/api/logout");
  });

  // Prevent back button after logout
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      // User pressed back button - verify auth
      initApp();
    }
  });

  // Guard against accessing app without login
  document.querySelectorAll(".tab-btn, .panel").forEach(el => {
    el.addEventListener("click", (e) => {
      if (!isAuthenticated) {
        e.preventDefault();
        window.location.href = "/login";
      }
    });
  });

  const lenSlider = document.getElementById("gen-length");
  const lenVal    = document.getElementById("gen-length-val");
  lenSlider.addEventListener("input", () => lenVal.textContent = lenSlider.value);

  document.getElementById("gen-btn").addEventListener("click", async () => {
    try {
      const data = await api(`/api/generate?length=${lenSlider.value}`);
      document.getElementById("gen-output").value = data.password;
      applyStrength(
        document.getElementById("gen-bar"),
        document.getElementById("gen-strength-lbl"),
        data.strength
      );
      document.getElementById("gen-result-block").style.display = "";
      document.getElementById("gen-save-block").style.display   = "";
    } catch (e) { toast("⚠ " + e.message); }
  });

  document.getElementById("gen-copy").addEventListener("click", () => {
    const pwd = document.getElementById("gen-output").value;
    if (!pwd) return;
    navigator.clipboard.writeText(pwd).then(() => toast("Copied to clipboard"));
  });

  document.getElementById("gen-save-btn").addEventListener("click", async () => {
    const app = document.getElementById("gen-app").value.trim();
    const password = document.getElementById("gen-output").value;
    if (!app) { toast("Enter the app or service name."); return; }
    try {
      await api("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: app, password, app }),
      });
      toast("✓ Saved to vault");
      document.getElementById("gen-app").value = "";
    } catch (e) { toast("⚠ " + e.message); }
  });


  document.getElementById("rev-btn").addEventListener("click", async () => {
    const password = document.getElementById("rev-input").value;
    if (!password) { toast("Enter a password to review."); return; }
    try {
      const data = await api("/api/review", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      applyStrength(
        document.getElementById("rev-bar"),
        document.getElementById("rev-strength-lbl"),
        data.strength
      );
      const ul = document.getElementById("rev-suggestions");
      ul.innerHTML = data.suggestions.length
        ? data.suggestions.map(s => `<li>${s}</li>`).join("")
        : `<li style="color:var(--vs)">Looks good — no improvements needed.</li>`;
      document.getElementById("rev-result-block").style.display = "";
      document.getElementById("rev-save-block").style.display   = "";
    } catch (e) { toast("⚠ " + e.message); }
  });

  document.getElementById("rev-save-btn").addEventListener("click", async () => {
    const app = document.getElementById("rev-app").value.trim();
    const password = document.getElementById("rev-input").value;
    if (!app) { toast("Enter the app or service name."); return; }
    try {
      await api("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: app, password, app }),
      });
      toast("✓ Saved to vault");
      document.getElementById("rev-app").value = "";
    } catch (e) { toast("⚠ " + e.message); }
  });


  async function loadVault() {
    // Guard: must be authenticated
    if (!isAuthenticated) {
      window.location.href = "/login";
      return;
    }
    const list = document.getElementById("vault-list");
    list.innerHTML = `<p class="vault-empty">Loading…</p>`;
    try {
      const entries = await api("/api/passwords");
      if (!entries.length) {
        list.innerHTML = `<p class="vault-empty">No saved passwords yet.</p>`;
        return;
      }
      list.innerHTML = entries.map(e => `
        <div class="vault-entry" id="entry-${e.id}">
          <div class="vault-entry-info">
            <div class="vault-entry-user">${escHtml(currentUserEmail)} <span style="font-size:.8rem; color:#000000;">${escHtml(e.app)}</span></div>
            <div class="vault-entry-pwd" data-id="${e.id}" data-hidden="true">••••••••••••</div>
          </div>
          <button class="btn icon" onclick="togglePwd(${e.id}, '${escHtml(e.password)}')" title="Show/hide">👁</button>
          <button class="btn icon" onclick="copyEntry('${escHtml(e.password)}')" title="Copy">⎘</button>
          <button class="btn icon danger" onclick="deleteEntry(${e.id})" title="Delete">✕</button>
        </div>
      `).join("");
    } catch (e) { 
      list.innerHTML = `<p class="vault-empty">Failed to load.</p>`; 
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function togglePwd(id, plain) {
    const el = document.querySelector(`.vault-entry-pwd[data-id="${id}"]`);
    if (!el) return;
    const hidden = el.dataset.hidden === "true";
    el.textContent = hidden ? plain : "••••••••••••";
    el.dataset.hidden = hidden ? "false" : "true";
  }

  function copyEntry(plain) {
    navigator.clipboard.writeText(plain).then(() => toast("Copied to clipboard"));
  }

  async function deleteEntry(id) {
    try {
      await api(`/api/passwords/${id}`, { method: "DELETE" });
      document.getElementById("entry-" + id)?.remove();
      const list = document.getElementById("vault-list");
      if (!list.children.length)
        list.innerHTML = `<p class="vault-empty">No saved passwords yet.</p>`;
      toast("Entry deleted.");
    } catch (e) { toast("⚠ " + e.message); }
  }

  document.getElementById("vault-refresh-btn").addEventListener("click", loadVault);
</script>
</body>
</html>
