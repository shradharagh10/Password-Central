<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Central - Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #e3f2fd 0%, #f0f4f9 50%, #e8eef5 100%);
      color: #1a1a2e;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 2px solid #d1d9e6;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(30, 144, 255, 0.2);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2.2rem;
      letter-spacing: -0.02em;
      text-align: center;
      background: linear-gradient(135deg, #1e90ff, #4a90e2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #6c757d;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-weight: 500;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .field label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1a1a2e;
      font-weight: 700;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      border: 2px solid #d1d9e6;
      background: #f8fbff;
      color: #1a1a2e;
      padding: 0.9rem 1.1rem;
      border-radius: 8px;
      outline: none;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input::placeholder {
      color: #adb5bd;
    }

    input:focus {
      border-color: #1e90ff;
      background: white;
      box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.1);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      background: linear-gradient(135deg, #1e90ff, #4a90e2);
      color: white;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(30, 144, 255, 0.2);
    }

    .btn:hover {
      background: linear-gradient(135deg, #1a7fdb, #3d85d8);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(30, 144, 255, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .secondary {
      background: white;
      color: #1e90ff;
      border: 2px solid #1e90ff;
      margin-top: 0.75rem;
      box-shadow: none;
    }

    .secondary:hover {
      background: rgba(30, 144, 255, 0.05);
      border-color: #4a90e2;
      color: #4a90e2;
    }

    #message {
      margin-bottom: 1.5rem;
      min-height: 1.25rem;
      color: #ff4757;
      font-size: 0.95rem;
      text-align: center;
      font-weight: 600;
    }

    #message.success {
      color: #10b981;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 1.8rem;
      }

      input {
        padding: 0.8rem 1rem;
        font-size: 16px;
      }

      .btn {
        padding: 0.9rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>🛡️ Password Central</h1>
    <p class="subtitle">Secure Password Manager</p>
    <div id="message"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>
    <button class="btn" id="login-btn">Log in</button>
    <button class="btn secondary" id="signup-btn">Sign up</button>
  </div>

  <script>
    const message = document.getElementById('message');
    function showMessage(text, isError = false) {
      message.textContent = text;
      message.style.color = isError ? '#ff4757' : '#10b981';
      message.className = isError ? '' : 'success';
    }

    async function request(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function initLoginPage() {
      try {
        const res = await fetch('/api/me');
        if (res.ok) {
          const data = await res.json();
          if (data?.loggedIn) {
            // User is already logged in, redirect immediately
            window.location.href = '/';
            return;
          }
        }
      } catch (e) {
        console.error("Auth check failed:", e);
      }
      // Clear any stale auth data
      localStorage.clear();
      sessionStorage.clear();
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        showMessage('Both email and password are required.', true);
        return;
      }
      // Clear any stale data before login
      localStorage.clear();
      sessionStorage.clear();
      try {
        await request('/api/login', { email, password });
        // Verify login was successful
        const me = await fetch('/api/me').then(r => r.json());
        if (me?.loggedIn) {
          window.location.href = '/';
        } else {
          showMessage('Login verification failed. Please try again.', true);
        }
      } catch (err) {
        showMessage(err.message, true);
      }
    });

    document.getElementById('signup-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        showMessage('Both email and password are required.', true);
        return;
      }
      // Clear any stale data before signup
      localStorage.clear();
      sessionStorage.clear();
      try {
        await request('/api/signup', { email, password });
        // Verify signup was successful
        const me = await fetch('/api/me').then(r => r.json());
        if (me?.loggedIn) {
          window.location.href = '/';
        } else {
          showMessage('Signup verification failed. Please try again.', true);
        }
      } catch (err) {
        showMessage(err.message, true);
      }
    });
    initLoginPage();
  </script>
</body>
</html>
